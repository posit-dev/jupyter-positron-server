name: tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  release:
    types: [published]

jobs:
  tests:
    name: "Run Tests"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.14"] # lowest and highest supported versions
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      - name: Run tests
        run: |
          uv run pytest

  release-pypi:
    name: "Release to pypi"
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: "Build Package"
        run: |
          uv build
      - name: "Deploy to PyPI"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
